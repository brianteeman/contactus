COM_CONTACTUS_THANKYOU_MSG_SPAM_BODY="Το αίτημα επικοινωνίας σας επισημάνθηκε ως πιθανό spam. Δυστυχώς, αυτό σημαίνει ότι κανένας άνθρωπος δεν θα διαβάσει το μήνυμά σας. Αν πιστεύετε ότι αυτό έγινε λανθασμένα, υποβάλετε νέο αίτημα ζητώντας μας να ελέγξουμε χειροκίνητα την προηγούμενη υποβολή σας. Παρακαλούμε <em>μην</em> προσπαθήσετε να στείλετε το ίδιο μήνυμα δύο φορές, γιατί θα εμφανιστεί το ίδιο σφάλμα."
